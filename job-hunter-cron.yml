name: Job Hunter Scheduled Scan

on:
  schedule:
    # Runs 4 times per day (every 6 hours) for free on GitHub Actions
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  trigger_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Hit Vercel Cron Endpoint
        run: |
          # Replace with your actual Vercel URL, or set it as a GitHub secret
          curl -sS https://job-hunter-agent-nour.vercel.app/api/cron
